<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  
  <!-- Dad figure (head) -->
  <circle cx="256" cy="145" r="52" fill="white" opacity="0.95"/>
  
  <!-- Dad figure (body) -->
  <path d="M 195 210 Q 195 195 210 190 L 256 185 L 302 190 Q 317 195 317 210 L 320 310 Q 320 320 310 320 L 202 320 Q 192 320 192 310 Z" fill="white" opacity="0.95"/>
  
  <!-- Arms holding scale -->
