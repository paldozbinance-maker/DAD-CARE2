  <path d="M 320 230 L 372 270 L 357 275 L 317 245" fill="white" opacity="0.9"/>
  
  <!-- Scale/weight bar -->
  <rect x="130" y="268" width="252" height="6" rx="3" fill="white" opacity="0.85"/>
  
  <!-- Left scale plate -->
  <path d="M 145 274 L 130 320 Q 128 330 140 330 L 180 330 Q 192 330 190 320 L 175 274" fill="white" opacity="0.8"/>
  
  <!-- Right scale plate -->
  <path d="M 337 274 L 322 320 Q 320 330 332 330 L 372 330 Q 384 330 382 320 L 367 274" fill="white" opacity="0.8"/>
  
  <!-- KG text -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="80" fill="white" opacity="0.95" letter-spacing="8">KG</text>
  
  <!-- Small decorative dots -->
  <circle cx="160" cy="440" r="4" fill="white" opacity="0.3"/>
  <circle cx="352" cy="440" r="4" fill="white" opacity="0.3"/>
  <circle cx="256" cy="460" r="3" fill="white" opacity="0.2"/>
</svg>
